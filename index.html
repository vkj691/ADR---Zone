<!DOCTYPE html>
<html lang="bg">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="theme-color" content="#c0392b">
<meta name="description" content="ADR Zone - Справочник за опасни товари">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="ADR Zone">
<link rel="manifest" href="manifest.json">
<title>ADR Zone</title>
<link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@400;600;700;800;900&family=Barlow:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --red:#c0392b;--red-dark:#96281b;--red-light:#e74c3c;
    --orange:#e67e22;--yellow:#f1c40f;--green:#27ae60;--blue:#2980b9;--purple:#8e44ad;
    --dark:#1a1a1a;--darker:#111;--card:#222;--border:#333;--text:#f0f0f0;--muted:#888;
    --font-heading:'Barlow Condensed',sans-serif;--font-body:'Barlow',sans-serif;
  }
  *{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
  body{background:var(--darker);color:var(--text);font-family:var(--font-body);min-height:100vh;overscroll-behavior:none}
  header{background:var(--red-dark);position:sticky;top:0;z-index:100;box-shadow:0 2px 12px rgba(0,0,0,.5)}
  .header-inner{display:flex;align-items:center;gap:12px;padding:12px 16px}
  .logo{font-family:var(--font-heading);font-size:28px;font-weight:900;letter-spacing:2px;color:#fff;line-height:1}
  .logo span{color:var(--yellow)}
  .offline-badge{margin-left:auto;font-size:11px;font-weight:600;background:rgba(255,255,255,.15);padding:3px 8px;border-radius:20px;letter-spacing:1px;display:none}
  .offline-badge.show{display:block}
  .search-wrap{padding:12px 16px;background:var(--dark);border-bottom:1px solid var(--border)}
  .search-box{display:flex;align-items:center;background:var(--card);border:1.5px solid var(--border);border-radius:10px;overflow:hidden;transition:border-color .2s}
  .search-box:focus-within{border-color:var(--red-light)}
  .search-icon{padding:0 12px;color:var(--muted);font-size:18px;flex-shrink:0}
  #searchInput{flex:1;background:none;border:none;outline:none;color:var(--text);font-family:var(--font-body);font-size:16px;padding:12px 0}
  #searchInput::placeholder{color:var(--muted)}
  .clear-btn{padding:0 14px;color:var(--muted);background:none;border:none;cursor:pointer;font-size:18px;display:none}
  .clear-btn.show{display:block}
  .nav-tabs{display:flex;background:var(--dark);border-bottom:2px solid var(--border);overflow-x:auto;scrollbar-width:none}
  .nav-tabs::-webkit-scrollbar{display:none}
  .tab-btn{flex-shrink:0;padding:10px 16px;background:none;border:none;border-bottom:3px solid transparent;color:var(--muted);font-family:var(--font-heading);font-size:14px;font-weight:700;letter-spacing:1px;cursor:pointer;transition:all .2s;margin-bottom:-2px;text-transform:uppercase}
  .tab-btn.active{color:var(--red-light);border-bottom-color:var(--red-light)}
  main{padding:12px 16px 80px;max-width:600px;margin:0 auto}
  .section-title{font-family:var(--font-heading);font-size:13px;font-weight:700;letter-spacing:2px;color:var(--muted);text-transform:uppercase;margin:16px 0 8px}
  .class-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px}
  .class-card{background:var(--card);border-radius:12px;padding:14px;border:1px solid var(--border);cursor:pointer;transition:all .15s;position:relative;overflow:hidden}
  .class-card:active{transform:scale(.97)}
  .class-card::before{content:'';position:absolute;left:0;top:0;bottom:0;width:4px;background:var(--accent,var(--red));border-radius:4px 0 0 4px}
  .class-num{font-family:var(--font-heading);font-size:30px;font-weight:900;color:var(--accent,var(--red));line-height:1}
  .class-name{font-size:13px;font-weight:600;color:var(--text);margin-top:4px;line-height:1.3}
  .class-icon{font-size:28px;position:absolute;right:12px;bottom:10px;opacity:.4}
  .detail-panel{display:none;animation:slideUp .25s ease}
  .detail-panel.active{display:block}
  @keyframes slideUp{from{opacity:0;transform:translateY(20px)}to{opacity:1;transform:translateY(0)}}
  .back-btn{display:flex;align-items:center;gap:8px;background:none;border:none;color:var(--red-light);font-family:var(--font-heading);font-size:16px;font-weight:700;cursor:pointer;padding:8px 0;margin-bottom:12px;letter-spacing:1px}
  .detail-header{background:var(--card);border-radius:14px;padding:20px;border:1px solid var(--border);margin-bottom:12px}
  .detail-class-num{font-family:var(--font-heading);font-size:48px;font-weight:900;line-height:1}
  .detail-class-name{font-family:var(--font-heading);font-size:22px;font-weight:700;margin-top:4px}
  .detail-desc{font-size:14px;color:var(--muted);margin-top:8px;line-height:1.5}
  .info-block{background:var(--card);border-radius:12px;padding:16px;border:1px solid var(--border);margin-bottom:10px}
  .info-block-title{font-family:var(--font-heading);font-size:13px;font-weight:700;letter-spacing:1.5px;text-transform:uppercase;margin-bottom:10px;display:flex;align-items:center;gap:8px}
  .info-block-title.danger{color:var(--red-light)}
  .info-block-title.action{color:var(--orange)}
  .info-block-title.protect{color:var(--blue)}
  .info-block-title.info{color:var(--green)}
  .info-list{list-style:none}
  .info-list li{font-size:14px;line-height:1.5;padding:5px 0;border-bottom:1px solid var(--border);display:flex;gap:8px;align-items:flex-start}
  .info-list li:last-child{border-bottom:none}
  .info-list li::before{content:'›';color:var(--red-light);font-weight:700;flex-shrink:0;margin-top:1px}
  .un-card{background:var(--card);border-radius:12px;padding:16px;border:1px solid var(--border);margin-bottom:10px;cursor:pointer;transition:all .15s;display:flex;align-items:center;gap:12px}
  .un-card:active{border-color:var(--red-light);transform:scale(.98)}
  .un-card-left{flex:1}
  .un-number{font-family:var(--font-heading);font-size:22px;font-weight:800;color:var(--orange)}
  .un-name{font-size:15px;font-weight:600;margin-top:2px}
  .un-class{font-size:12px;color:var(--muted);margin-top:4px}
  .un-tags{display:flex;gap:6px;flex-wrap:wrap;margin-top:8px}
  .tag{font-size:11px;font-weight:600;padding:2px 8px;border-radius:20px;letter-spacing:.5px}
  .tag-red{background:rgba(192,57,43,.25);color:#e74c3c}
  .tag-orange{background:rgba(230,126,34,.25);color:#e67e22}
  .tag-blue{background:rgba(41,128,185,.25);color:#5dade2}
  .tag-green{background:rgba(39,174,96,.25);color:#2ecc71}
  .tag-purple{background:rgba(142,68,173,.25);color:#a569bd}
  .un-arrow{color:var(--muted);font-size:24px;flex-shrink:0}
  .un-detail-badge{display:inline-block;background:var(--orange);color:#fff;font-family:var(--font-heading);font-size:13px;font-weight:800;padding:4px 12px;border-radius:20px;letter-spacing:1px;margin-bottom:8px}
  .action-steps{list-style:none;counter-reset:steps}
  .action-steps li{font-size:14px;line-height:1.5;padding:6px 0;border-bottom:1px solid var(--border);display:flex;gap:10px;align-items:flex-start;counter-increment:steps}
  .action-steps li:last-child{border-bottom:none}
  .action-steps li::before{content:counter(steps);background:var(--step-color,var(--red));color:#fff;font-family:var(--font-heading);font-weight:700;font-size:12px;min-width:22px;height:22px;border-radius:50%;display:flex;align-items:center;justify-content:center;flex-shrink:0;margin-top:1px}
  .warn-box{background:rgba(192,57,43,.15);border:1px solid var(--red);border-radius:10px;padding:12px;margin-bottom:10px;font-size:13px;line-height:1.5;color:#f5b7b1}
  .warn-box strong{display:block;font-family:var(--font-heading);font-size:15px;letter-spacing:1px;margin-bottom:4px;color:var(--red-light)}
  .action-card{background:var(--card);border-radius:12px;padding:16px;border:1px solid var(--border);border-left:4px solid var(--accent-color,var(--red));margin-bottom:10px}
  .action-title{font-family:var(--font-heading);font-size:17px;font-weight:700;letter-spacing:.5px;margin-bottom:8px;color:var(--accent-color,var(--red-light))}
  .placard-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:10px}
  .placard{aspect-ratio:1;border-radius:10px;display:flex;flex-direction:column;align-items:center;justify-content:center;font-family:var(--font-heading);font-weight:900;border:2px solid transparent}
  .placard-num{font-size:32px;line-height:1}
  .placard-label{font-size:10px;letter-spacing:1px;text-align:center;padding:0 4px;margin-top:2px;line-height:1.2}
  .no-results{text-align:center;padding:40px 20px;color:var(--muted);font-size:15px}
  #searchResults{display:none}
  #searchResults.active{display:block}
  .view{display:none}
  .view.active{display:block}
  .bottom-nav{position:fixed;bottom:0;left:0;right:0;background:var(--dark);border-top:1px solid var(--border);display:flex;z-index:100;padding-bottom:env(safe-area-inset-bottom)}
  .nav-btn{flex:1;background:none;border:none;padding:10px 0;color:var(--muted);font-family:var(--font-heading);font-size:10px;font-weight:700;letter-spacing:1px;text-transform:uppercase;cursor:pointer;display:flex;flex-direction:column;align-items:center;gap:4px;transition:color .2s}
  .nav-btn svg{width:22px;height:22px}
  .nav-btn.active{color:var(--red-light)}
</style>
</head>
<body>

</nav>

function tc(t){if(['токсичен','смъртоносен'].includes(t))return'purple';if(['запалим','пожароопасен','самозапалващ','канцероген'].includes(t))return'red';if(['окислител','корозивен'].includes(t))return'orange';if(['криогенен','незапалим'].includes(t))return'blue';return'green';}

function init(){
  document.getElementById('classGrid').innerHTML=ADR_CLASSES.map(c=>`<div class="class-card" style="--accent:${c.accent}" onclick="showClass('${c.id}')"><div class="class-num">${c.id}</div><div class="class-name">${c.name}</div><div class="class-icon">${c.icon}</div></div>`).join('');
  document.getElementById('unList').innerHTML=UN_SUBSTANCES.map(u=>`<div class="un-card" onclick="showUN('${u.un}')"><div class="un-card-left"><div class="un-number">UN ${u.un}</div><div class="un-name">${u.name}</div><div class="un-class">Клас ${u.class} • ОГ: ${u.pg}</div><div class="un-tags">${u.tags.map(t=>`<span class="tag tag-${tc(t)}">${t}</span>`).join('')}</div></div><div class="un-arrow">›</div></div>`).join('');
  document.getElementById('emergencyList').innerHTML=GEN_EM.map(a=>`<div class="action-card" style="--accent-color:${a.accent}"><div class="action-title">${a.title}</div><ol class="action-steps" style="--step-color:${a.accent}">${a.steps.map(s=>`<li>${s}</li>`).join('')}</ol></div>`).join('');
  document.getElementById('placardGrid').innerHTML=PLACARDS.map(p=>`<div class="placard" style="background:${p.bg};color:${p.color};border-color:${p.color}"><div class="placard-num">${p.num}</div><div class="placard-label">${p.label}</div></div>`).join('');
  setupSearch();
  const b=document.getElementById('offlineBadge');
  const u=()=>b.classList.toggle('show',!navigator.onLine);
  window.addEventListener('online',u);window.addEventListener('offline',u);u();
}

function infoBlock(cls,icon,title,items){return`<div class="info-block"><div class="info-block-title ${cls}">${icon} ${title}</div><ul class="info-list">${items.map(i=>`<li>${i}</li>`).join('')}</ul></div>`;}

function showClass(id){
  const c=ADR_CLASSES.find(x=>x.id===id);if(!c)return;
  document.getElementById('classDetailView').innerHTML=`<button class="back-btn" onclick="backToClasses()">← НАЗАД</button><div class="detail-header" style="border-left:5px solid ${c.accent}"><div class="detail-class-num" style="color:${c.accent}">${c.id}</div><div class="detail-class-name">${c.name}</div><div class="detail-desc">${c.desc}</div></div>${c.subclasses.length?infoBlock('info','📋','ПОДКЛАСОВЕ',c.subclasses):''}${infoBlock('danger','⚠️','ОСНОВНИ ОПАСНОСТИ',c.dangers)}${infoBlock('action','🚨','ДЕЙСТВИЯ ПРИ АВАРИЯ',c.actions)}${infoBlock('protect','🛡️','ЛИЧНА ЗАЩИТА',c.protection)}${infoBlock('info','🧯','ПОЖАРОГАСЕНЕ',c.firefighting)}`;
  document.getElementById('classesListView').style.display='none';
  document.getElementById('classDetailView').classList.add('active');
}
function backToClasses(){document.getElementById('classesListView').style.display='block';const d=document.getElementById('classDetailView');d.classList.remove('active');d.innerHTML='';}

function showUN(un){
  const u=UN_SUBSTANCES.find(x=>x.un===un);if(!u)return;
  const ck=u.class.replace(/\/.*/,'');
  const em=CLASS_EM[ck]||CLASS_EM['9'];
  const cl=ADR_CLASSES.find(c=>c.id===ck);
  const ac=cl?cl.accent:'#e74c3c';
  document.getElementById('unDetailView').innerHTML=`<button class="back-btn" onclick="backToUN()">← НАЗАД</button><div class="detail-header" style="border-left:5px solid ${ac}"><div class="un-detail-badge">UN ${u.un}</div><div class="detail-class-num" style="color:${ac};font-size:32px">${u.name}</div><div class="detail-desc">Клас ${u.class} • Опаковъчна група: ${u.pg}</div><div class="un-tags" style="margin-top:10px">${u.tags.map(t=>`<span class="tag tag-${tc(t)}">${t}</span>`).join('')}</div></div><div style="background:rgba(192,57,43,.15);border:1px solid #c0392b;border-radius:10px;padding:12px;margin-bottom:10px;font-size:13px;line-height:1.5;color:#f5b7b1"><strong style="display:block;font-family:var(--font-heading);font-size:15px;letter-spacing:1px;margin-bottom:4px;color:#e74c3c">${em.warn}</strong>${em.detail}</div><div class="info-block"><div class="info-block-title action">🚨 ДЕЙСТВИЯ ПРИ АВАРИЯ</div><ol class="action-steps" style="--step-color:${ac}">${em.actions.map(a=>`<li>${a}</li>`).join('')}</ol></div>${infoBlock('protect','🛡️','ЛИЧНА ЗАЩИТА',em.protect)}${infoBlock('info','🧯','ПОЖАРОГАСЕНЕ',em.fire)}`;
  document.getElementById('unListView').style.display='none';
  document.getElementById('unDetailView').classList.add('active');
  window.scrollTo(0,0);
}
function backToUN(){document.getElementById('unListView').style.display='block';const d=document.getElementById('unDetailView');d.classList.remove('active');d.innerHTML='';}

function setupSearch(){
  document.getElementById('searchInput').addEventListener('input',e=>{
    const v=e.target.value.trim();
    document.getElementById('clearBtn').classList.toggle('show',v.length>0);
    doSearch(v);
  });
}
function clearSearch(){document.getElementById('searchInput').value='';document.getElementById('clearBtn').classList.remove('show');const r=document.getElementById('searchResults');r.classList.remove('active');r.innerHTML='';}
function doSearch(q){
  const r=document.getElementById('searchResults');
  if(!q){r.classList.remove('active');r.innerHTML='';return;}
  const ql=q.toLowerCase();
  const um=UN_SUBSTANCES.filter(u=>u.un.includes(ql)||u.name.toLowerCase().includes(ql)||u.tags.some(t=>t.includes(ql)));
  const cm=ADR_CLASSES.filter(c=>c.name.toLowerCase().includes(ql)||c.id.includes(ql));
  let h='';
  if(cm.length)h+=`<p class="section-title">КЛАСОВЕ</p><div class="class-grid">${cm.map(c=>`<div class="class-card" style="--accent:${c.accent}" onclick="switchTab('classes');clearSearch();setTimeout(()=>showClass('${c.id}'),50)"><div class="class-num">${c.id}</div><div class="class-name">${c.name}</div><div class="class-icon">${c.icon}</div></div>`).join('')}</div>`;
  if(um.length)h+=`<p class="section-title" style="margin-top:16px">UN — НАТИСНИ ЗА ДЕЙСТВИЯ ПРИ АВАРИЯ</p>${um.map(u=>`<div class="un-card" onclick="switchTab('un');clearSearch();setTimeout(()=>showUN('${u.un}'),50)"><div class="un-card-left"><div class="un-number">UN ${u.un}</div><div class="un-name">${u.name}</div><div class="un-class">Клас ${u.class} • ОГ: ${u.pg}</div><div class="un-tags">${u.tags.map(t=>`<span class="tag tag-${tc(t)}">${t}</span>`).join('')}</div></div><div class="un-arrow">›</div></div>`).join('')}`;
  if(!h)h=`<div class="no-results">🔍 Няма резултати за "${q}"</div>`;
  r.innerHTML=h;r.classList.add('active');
}

function switchTab(tab,tabEl,navEl){
  clearSearch();
  document.querySelectorAll('.view').forEach(v=>v.classList.remove('active'));
  document.getElementById('view-'+tab).classList.add('active');
  const order=['classes','un','emergency','placards'];
  const i=order.indexOf(tab);
  document.querySelectorAll('.tab-btn').forEach((b,j)=>b.classList.toggle('active',i===j));
  document.querySelectorAll('.nav-btn').forEach((b,j)=>b.classList.toggle('active',i===j));
}

init();
if('serviceWorker' in navigator)navigator.serviceWorker.register('./sw.js').catch(()=>{});
</script>
</body>
</html>
